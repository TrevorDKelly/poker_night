name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Triggers the workflow on push or merge to main

permissions:
  contents: write # Allows the workflow to push the build to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Uses Node 20, compatible with modern Vue/Vite apps
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Performs a clean, automated install of your packages

      - name: Build Project
        run: npm run build # Generates the 'dist' folder

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder the action should deploy
          branch: gh-pages # The branch the action deploys to
